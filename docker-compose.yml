services:
  cowrie:
    image: cowrie/cowrie:latest
    restart: always
    ports: 
      - "22:2222"
    environment: 
      - COWRIE_OUTPUT_DSHIELD_ENABLED=${ENABLE_DSHIELD}
      - COWRIE_OUTPUT_DSHIELD_USERID=${DSHIELD_USERID}
      - COWRIE_OUTPUT_DSHIELD_AUTH_KEY=${DSHIELD_AUTHKEY}
      - COWRIE_OUTPUT_JSONLOG_ENABLED=true
    volumes: 
      - ./logs/cowrie:/cowrie/cowrie-git/var/log/cowrie

  isc-agent:
    build: .
    restart: always
    ports:
      - "80:8000"
    environment:
      - DSHIELD_USERID=${DSHIELD_USERID}
      - DSHIELD_AUTHKEY=${DSHIELD_AUTHKEY}
    volumes:
      - ./logs/isc-agent:/srv/log
  
  grafana:
    image: grafana/grafana:latest
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    profiles: ["grafana"]

volumes:
  grafana-data:
