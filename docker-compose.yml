services:
  cowrie:
    image: cowrie/cowrie:latest
    restart: always
    ports: 
      - "22:2222"
    environment: 
      - COWRIE_OUTPUT_DSHIELD_ENABLED=${ENABLE_DSHIELD}
      - COWRIE_OUTPUT_DSHIELD_USERID=${DSHIELD_USERID}
      - COWRIE_OUTPUT_DSHIELD_AUTH_KEY=${DSHIELD_AUTHKEY}
      - COWRIE_OUTPUT_JSONLOG_ENABLED=true
    volumes: 
      - ./logs/cowrie:/cowrie/cowrie-git/var/log/cowrie
      - ./cowrie-config/etc:/cowrie/cowrie-git/etc
      - ./cowrie-config/data:/cowrie/cowrie-git/data

  isc-agent:
    build: .
    restart: always
    ports:
      - "80:8000"
    environment:
      - DSHIELD_USERID=${DSHIELD_USERID}
      - DSHIELD_AUTHKEY=${DSHIELD_AUTHKEY}
    volumes:
      - ./logs/isc-agent:/srv/log
  
  grafana:
    image: grafana/grafana:latest
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    profiles: ["grafana"]
  loki:
    image: grafana/loki:latest
    restart: always
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    profiles: ["grafana"]

  promtail:
    image: grafana/promtail:latest
    restart: always
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml
      - ./logs/cowrie:/var/log/cowrie:ro
      - ./logs/isc-agent:/var/log/isc-agent:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    profiles: ["grafana"]

  grafana-proxy:
    image: nginx:latest
    restart: always
    ports:
      - "443:443"
    volumes:
      - ./nginx-grafana.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - grafana
    profiles: ["grafana"]


volumes:
  grafana-data:
  loki-data:
